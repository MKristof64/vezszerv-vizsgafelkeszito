<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VezSzerv vizsgafelkészítő</title>
  <meta http-equiv="refresh" content="0; url=./output/vezszerv-tanuloapp.html">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3ede0;
      --card: rgba(255, 255, 255, 0.92);
      --ink: #1f2a27;
      --muted: #5f6f6a;
      --accent: #b85d3d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(184, 93, 61, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(31, 97, 85, 0.18), transparent 24%),
        linear-gradient(180deg, #eee4d4 0%, var(--bg) 48%, #ebe1d0 100%);
      color: var(--ink);
      font-family: "Aptos", "Segoe UI", Calibri, sans-serif;
    }

    .card {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 48px rgba(20, 31, 28, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Palatino Linotype", Georgia, serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.08;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #964327);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>VezSzerv vizsgafelkészítő</h1>
    <p>Átirányítás a megosztható HTML appra. Ha nem történik meg automatikusan, használd az alábbi gombot.</p>
    <a id="open-app" href="./output/vezszerv-tanuloapp.html">App megnyitása</a>
  </main>
  <script>
    const target = `./output/vezszerv-tanuloapp.html${window.location.hash || ""}`;
    document.getElementById("open-app").setAttribute("href", target);
    window.location.replace(target);
  </script>
</body>
</html>
